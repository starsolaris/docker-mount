name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }

      - name: install musl
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools

      - name: build
        run: make all

      - name: test
        run: make test

      - name: vet
        run: make vet
