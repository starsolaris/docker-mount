name: release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }

      - name: install musl
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools

      - name: build
        run: make all

      - name: package
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tar -czf "docker-mount-${tag}-linux-amd64.tar.gz" docker-mount

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: docker-mount-*.tar.gz
          body: |
            See [install.sh](https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/install.sh) for one-line install:
            ```
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/install.sh | sh
            ```
